services:
  postgres:
    image: postgres:16
    container_name: hotel-intel-postgres
    environment:
      POSTGRES_DB: hotel_intel
      POSTGRES_USER: hotel_intel_app
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - hotel_intel_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

volumes:
  hotel_intel_pgdata:

